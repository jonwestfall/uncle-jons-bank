name: PR Quality Gates

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  backend-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install -r backend/requirements-dev.txt

      - name: Backend formatting gate
        run: ruff format --check backend/app/money.py

      - name: Backend lint gate
        run: ruff check backend/app backend/app/tests --select E9,F63,F7,F82

      - name: Backend type-check gate
        run: mypy --config-file mypy.ini backend/app/schemas backend/app/money.py

      - name: Backend test + coverage gate
        env:
          SECRET_KEY: ci-secret-key
          JWT_ISSUER: uncle-jons-bank
          JWT_AUDIENCE: uncle-jons-bank-api
        run: |
          pytest backend/app/tests \
            --cov=backend/app \
            --cov-report=term-missing \
            --cov-fail-under=70

  frontend-quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Frontend formatting gate
        run: npm run format:check

      - name: Frontend lint gate
        run: npm run lint

      - name: Frontend type-check gate
        run: npm run typecheck

      - name: Frontend component tests + coverage gate
        run: npm run test:component

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Frontend e2e smoke tests
        run: npm run build && npm run test:smoke
